services:
  media-router:
    build:
      context: .
      args:
        MEDIA_ROUTER_APP_VERSION: "v0.8.1"
        MEDIA_ROUTER_GIT_BRANCH: "${MEDIA_ROUTER_GIT_BRANCH:-main}"
        MEDIA_ROUTER_GIT_COMMIT: "${MEDIA_ROUTER_GIT_COMMIT:-fdc842f}"
    container_name: media-router
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      MEDIA_ROUTER_APP_PORT: "8088"
      MEDIA_ROUTER_PUBLIC_BASE_URL: "http://media-router:8088"
      MEDIA_ROUTER_DATA_DIR: "/data"
      MEDIA_ROUTER_APP_VERSION: "v0.8.1"
      MEDIA_ROUTER_GIT_BRANCH: "${MEDIA_ROUTER_GIT_BRANCH:-main}"
      MEDIA_ROUTER_GIT_COMMIT: "${MEDIA_ROUTER_GIT_COMMIT:-fdc842f}"
    volumes:
      - ./data:/data
      - /Users/Shared/IPTVBoss/output:/iptvboss/outputs:ro
      - /Users/Shared/MediaRouter/strm/movies:/outputs/movies
      - /Users/Shared/MediaRouter/strm/series:/outputs/series
      - /Users/Shared/MediaRouter/live:/outputs/live
